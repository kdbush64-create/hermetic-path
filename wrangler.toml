name = "hermetic-path"
main = "src/worker.js"
compatibility_date = "2024-11-01"
workers_dev = true

# Import .html, .webmanifest, .txt, .svg files as text strings inside the worker.
[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.webmanifest", "**/*.txt", "**/*.svg"]
fallthrough = true

# Import .json files as parsed JS objects.
[[rules]]
type = "Data"
globs = ["**/*.json"]
fallthrough = true

# ---------------------------------------------------------------------------
# DEV environment — deploys to hermetic-path-dev.<account>.workers.dev
# ---------------------------------------------------------------------------
[env.dev]
name = "hermetic-path-dev"
workers_dev = true

[[env.dev.kv_namespaces]]
binding = "HERMETIC_USERS"
id = "e0272c7f42d44a67a1828571b3233688"

[[env.dev.kv_namespaces]]
binding = "HERMETIC_INVITES"
id = "c2c70e208b1b441a8ded72c270804a0c"

# Cloudflare Workers AI — free tier, runs Llama 3.3 70B inside CF.
[env.dev.ai]
binding = "AI"

[env.dev.vars]
ENVIRONMENT = "dev"

# ---------------------------------------------------------------------------
# PRODUCTION environment — serves hermeticpath.v64otd.com
# ---------------------------------------------------------------------------
[env.production]
name = "hermetic-path"
workers_dev = false
routes = [
  { pattern = "hermeticpath.v64otd.com/*", zone_name = "v64otd.com" }
]

[[env.production.kv_namespaces]]
binding = "HERMETIC_USERS"
id = "54be65b51d714a4e9b30fae36f549821"

[[env.production.kv_namespaces]]
binding = "HERMETIC_INVITES"
id = "fb7b29a247e74fb6946c3a196aeba879"

[env.production.ai]
binding = "AI"

[env.production.vars]
ENVIRONMENT = "production"
